<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Rifa</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
</head>
<body class="pagina-admin">

  <div class="container">
    <div class="panel panel-admin">
      <h1>Panel Administrador</h1>

      <div class="acciones-admin">
        <button onclick="descargarCSV()">Descargar Rifa</button>
        <button id="btnLimpiarLista">Limpiar lista</button>
      </div>

      <h2>Configurar información del modal</h2>

      <div class="config-rifa">
        <input type="text" id="titulo_modal" placeholder="Título del modal">
        <input type="text" id="subtitulo_modal" placeholder="Subtítulo del modal">
        <input type="text" id="valor_numero" placeholder="Valor del número">
        <input type="text" id="forma_pago" placeholder="Forma de pago">
        <input type="text" id="whatsapp" placeholder="WhatsApp (ej: 543472123456)">
        <textarea id="mensaje_extra" placeholder="Mensaje extra"></textarea>

        <button id="guardarConfigBtn">Guardar información</button>
      </div>

      <h2>Configuración guardada</h2>

      <div class="tabla-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Valor número</th>
              <th>Forma de pago</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaConfig"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
