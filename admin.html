<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Rifa JC Hogar</title>

  <link rel="stylesheet" href="./style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabaseClient.js"></script>
</head>
<body>

  <div class="container">
    <div class="panel">
      <h1>Panel Administrador</h1>
      <p class="subtitulo">Gestioná la configuración y los números de la rifa</p>

      <!-- CONFIGURACIÓN -->
      <section class="admin-section">
        <h2>Configuración del modal / información</h2>

        <div class="form-grid">
          <div class="form-group">
            <label for="tituloModalInput">Título del modal</label>
            <input type="text" id="tituloModalInput" placeholder="Ej: Reservar número">
          </div>

          <div class="form-group">
            <label for="subtituloModalInput">Subtítulo del modal</label>
            <input type="text" id="subtituloModalInput" placeholder="Ej: Completá tus datos para reservar">
          </div>

          <div class="form-group">
            <label for="valorNumeroInput">Valor del número</label>
            <input type="text" id="valorNumeroInput" placeholder="Ej: 2500">
          </div>

          <div class="form-group">
            <label for="formaPagoInput">Forma de pago</label>
            <input type="text" id="formaPagoInput" placeholder="Ej: Transferencia / Efectivo">
          </div>

          <div class="form-group">
            <label for="whatsappInput">WhatsApp (con característica)</label>
            <input type="text" id="whatsappInput" placeholder="Ej: 5493472123456">
          </div>

          <div class="form-group full-width">
            <label for="mensajeExtraInput">Mensaje extra</label>
            <textarea id="mensajeExtraInput" rows="3" placeholder="Ej: Enviame el comprobante luego de reservar."></textarea>
          </div>
        </div>

        <button id="btnGuardarConfig" class="btn-guardar">Guardar información</button>
      </section>

      <!-- BOTONES DE ACCIÓN -->
      <section class="admin-section">
        <div class="acciones-superiores">
          <button id="btnDescargarRifa" class="btn-descargar">⬇ Descargar rifa (CSV)</button>
          <button id="btnLimpiarGrilla" class="btn-cancelar">Limpiar grilla entera</button>
        </div>
      </section>

      <!-- TABLA DE NÚMEROS -->
      <section class="admin-section">
        <h2>Lista de números</h2>

        <div class="tabla-container">
          <table>
            <thead>
              <tr>
                <th>Número</th>
                <th>Nombre</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaAdmin"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
